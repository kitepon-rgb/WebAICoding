<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f3ece4"/>

  <!-- Top accent bar -->
  <rect width="1200" height="8" fill="#da7b4a"/>

  <!-- Icon -->
  <rect x="80" y="180" width="80" height="80" rx="16" fill="#da7b4a"/>
  <text x="120" y="212" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">&gt;_</text>
  <text x="120" y="240" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">CC</text>

  <!-- Site title -->
  <text x="190" y="210" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#3d2e24">Claude Code</text>
  <text x="190" y="260" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#da7b4a">始めました</text>

  <!-- Subtitle -->
  <text x="190" y="320" font-family="Georgia, serif" font-size="24" fill="#7a6555">Claude MAX ユーザーの実体験ベース技術ブログ</text>

  <!-- Bottom decoration -->
  <rect x="80" y="520" width="200" height="4" rx="2" fill="#da7b4a"/>
  <rect x="80" y="540" width="120" height="4" rx="2" fill="#d4a27a" opacity="0.5"/>

  <!-- Terminal lines decoration -->
  <text x="800" y="420" font-family="monospace" font-size="18" fill="#d4a27a" opacity="0.3">$ claude</text>
  <text x="800" y="450" font-family="monospace" font-size="18" fill="#d4a27a" opacity="0.2">$ /init</text>
  <text x="800" y="480" font-family="monospace" font-size="18" fill="#d4a27a" opacity="0.15">$ /rc</text>
  <text x="800" y="510" font-family="monospace" font-size="18" fill="#d4a27a" opacity="0.1">$ /compact</text>
</svg>
